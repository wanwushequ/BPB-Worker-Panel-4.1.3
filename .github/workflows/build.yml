name: Build and Commit

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # 北京时间 03:00 -> UTC 19:00 (前一天)
    # 北京时间 15:00 -> UTC 07:00
    - cron: '0 7,19 * * *'

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'schedule' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Commit and Push _worker.js
        run: |
          # 配置 Git 用户信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 将dist/worker.js命名为 _worker.js
          if [ -f "dist/worker.js" ]; then
            cp dist/worker.js ./_worker.js
          else
            echo "Error: dist/worker.js not found!"
            exit 1
          fi

          # 提交到仓库
          git add _worker.js
          
          # 检查
          if git diff --staged --quiet; then
            echo "No changes to _worker.js, skipping commit."
          else
            git commit -m "Automated build: update _worker.js"
            git push origin HEAD:${{ github.ref }}
          fi